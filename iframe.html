<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Tag Example</title>
</head>

<body>
    <h2>HTML Frame Tags</h2>
    <center>
        <h3>iframe:1</h3>
        <iframe src="https://jsfiddle.net/" width="600" height="400" style="border: 2px solid blue;"></iframe>

        <br><br>

        <h3>iframe:2</h3>
        <iframe src="https://www.wikipedia.org" width="600" height="400" style="border:2px solid blue;">
        </iframe>

        <h3>iframe:3</h3>
        <iframe src="https://example.com" width="600" height="400" style="border: 2px solid blue;"></iframe>

        <h3>iframe:4</h3>
        <iframe src="http://wikibooks.org/" frameborder="0" width="600" height="400" 
            style="border: 2px solid black;"></iframe>



    </center>



</body>

</html>
