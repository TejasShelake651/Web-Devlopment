<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Links Example</title>
</head>

<body>

    <h1>HTML Link Examples</h1>

    <h2>1. Link Using Text</h2>
    <p>
        Click the text below to open Google:
    </p>

    <a href="https://www.google.com">Visit Google</a>


    <h2>2. Link Using Image</h2>
    <p>
        Click the image below to open YouTube:
    </p>

    <a href="https://www.youtube.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg"
             alt="YouTube Logo"
             width="200">
    </a>

</body>
</html>
